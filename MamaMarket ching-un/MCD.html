<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>MamaMarket — MCD</title>
<style>
    body { margin: 0; background: #FBF5E8; font-family: 'Segoe UI', sans-serif; }
    .container { padding: 20px; }
    h1 { font-family: Georgia, serif; color: #5C2D0A; text-align: center; margin-bottom: 6px; font-size: 28px; }
    .subtitle { text-align: center; color: #8A6040; font-size: 14px; margin-bottom: 24px; }

    svg { display: block; margin: 0 auto; }

  /* Tables */
    .table-header { font-weight: bold; font-size: 13px; }
    .table-col    { font-size: 11px; fill: #444; }
    .table-pk     { font-size: 11px; fill: #D4580A; font-weight: bold; }
    .table-fk     { font-size: 11px; fill: #2A6B35; }

  /* Relations */
    .relation { stroke: #C8901A; stroke-width: 2; fill: none; stroke-dasharray: 6,3; }
    .relation-label { font-size: 10px; fill: #8A6040; font-style: italic; }

  /* Kente decoratif */
    .kente { height: 8px; }
</style>
</head>
<body>
<div class="container">
    <h1>🌺 MamaMarket — MCD</h1>
    <p class="subtitle">Modèle Conceptuel de Données · 9 entités · Nodejs + MySQL</p>

    <!-- Bande kente -->
    <svg width="1100" height="8" style="display:block;margin:0 auto 20px">
        <rect x="0"   width="183" height="8" fill="#D4580A"/>
        <rect x="183" width="183" height="8" fill="#2A6B35"/>
        <rect x="366" width="183" height="8" fill="#C8901A"/>
        <rect x="549" width="183" height="8" fill="#8B4513"/>
        <rect x="732" width="183" height="8" fill="#E8761A"/>
        <rect x="915" width="183" height="8" fill="#3A8B47"/>
    </svg>

    <svg width="1100" height="820" viewBox="0 0 1100 820">

    <!--DÉFINITION DES TABLES -->

    <!-- USERS -->
    <g id="users" transform="translate(30, 30)">
        <rect width="180" height="185" rx="8" fill="white" stroke="#D4580A" stroke-width="2" filter="url(#shadow)"/>
        <rect width="180" height="36" rx="8" fill="#D4580A"/>
        <rect y="28" width="180" height="8" fill="#D4580A"/>
        <text x="90" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">👤 users</text>
        <text x="12" y="58"  class="table-pk" fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  class="table-col" fill="#444" font-size="11" font-family="Segoe UI">nom</text>
        <text x="12" y="94"  class="table-col" fill="#444" font-size="11" font-family="Segoe UI">email (unique)</text>
        <text x="12" y="112" class="table-col" fill="#444" font-size="11" font-family="Segoe UI">telephone</text>
        <text x="12" y="130" class="table-col" fill="#444" font-size="11" font-family="Segoe UI">role (acheteur|vendeuse|coursiere)</text>
        <text x="12" y="148" class="table-col" fill="#444" font-size="11" font-family="Segoe UI">marche_principal</text>
        <text x="12" y="166" class="table-col" fill="#444" font-size="11" font-family="Segoe UI">her_score / note</text>
        <text x="12" y="181" class="table-col" fill="#888" font-size="10" font-family="Segoe UI">+ 12 autres champs...</text>
    </g>

    <!-- MARCHES -->
    <g id="marches" transform="translate(280, 30)">
        <rect width="175" height="145" rx="8" fill="white" stroke="#2A6B35" stroke-width="2" filter="url(#shadow)"/>
        <rect width="175" height="36" rx="8" fill="#2A6B35"/>
        <rect y="28" width="175" height="8" fill="#2A6B35"/>
        <text x="87" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">📍 marches</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#444" font-size="11" font-family="Segoe UI">nom (Adjamé, Cocody...)</text>
        <text x="12" y="94"  fill="#444" font-size="11" font-family="Segoe UI">commune</text>
        <text x="12" y="112" fill="#444" font-size="11" font-family="Segoe UI">point_remise_livreur</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">latitude / longitude</text>
    </g>

    <!-- PRODUITS -->
    <g id="produits" transform="translate(530, 30)">
        <rect width="185" height="195" rx="8" fill="white" stroke="#8B4513" stroke-width="2" filter="url(#shadow)"/>
        <rect width="185" height="36" rx="8" fill="#8B4513"/>
        <rect y="28" width="185" height="8" fill="#8B4513"/>
        <text x="92" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">🛍️ produits</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#444" font-size="11" font-family="Segoe UI">nom</text>
        <text x="12" y="94"  fill="#444" font-size="11" font-family="Segoe UI">prix / prix_barre</text>
        <text x="12" y="112" fill="#444" font-size="11" font-family="Segoe UI">categorie</text>
        <text x="12" y="130" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 marche_id (FK)</text>
        <text x="12" y="148" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 vendeuse_id (FK)</text>
        <text x="12" y="166" fill="#444" font-size="11" font-family="Segoe UI">stock / statut</text>
        <text x="12" y="181" fill="#444" font-size="11" font-family="Segoe UI">nego_autorisee</text>
    </g>

    <!-- COMMANDES -->
    <g id="commandes" transform="translate(30, 290)">
        <rect width="185" height="195" rx="8" fill="white" stroke="#2A9D8F" stroke-width="2" filter="url(#shadow)"/>
        <rect width="185" height="36" rx="8" fill="#2A9D8F"/>
        <rect y="28" width="185" height="8" fill="#2A9D8F"/>
        <text x="92" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">🧾 commandes</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#444" font-size="11" font-family="Segoe UI">reference (MM-2847)</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 client_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 marche_id (FK)</text>
        <text x="12" y="130" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 coursiere_id (FK)</text>
        <text x="12" y="148" fill="#444" font-size="11" font-family="Segoe UI">total / statut</text>
        <text x="12" y="166" fill="#444" font-size="11" font-family="Segoe UI">statut_paiement</text>
        <text x="12" y="181" fill="#888" font-size="10" font-family="Segoe UI">9 statuts possibles</text>
    </g>

    <!-- COMMANDE_ITEMS -->
    <g id="items" transform="translate(285, 290)">
        <rect width="180" height="165" rx="8" fill="white" stroke="#7B3F9E" stroke-width="2" filter="url(#shadow)"/>
        <rect width="180" height="36" rx="8" fill="#7B3F9E"/>
        <rect y="28" width="180" height="8" fill="#7B3F9E"/>
        <text x="90" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">📦 commande_items</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 commande_id (FK)</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 produit_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 vendeuse_id (FK)</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">prix_nego / quantite</text>
        <text x="12" y="148" fill="#444" font-size="11" font-family="Segoe UI">collecte (boolean)</text>
    </g>

    <!-- MISSIONS -->
    <g id="missions" transform="translate(535, 290)">
        <rect width="178" height="175" rx="8" fill="white" stroke="#C8901A" stroke-width="2" filter="url(#shadow)"/>
        <rect width="178" height="36" rx="8" fill="#C8901A"/>
        <rect y="28" width="178" height="8" fill="#C8901A"/>
        <text x="89" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">🧺 missions</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 commande_id (FK)</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 coursiere_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 marche_id (FK)</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">montant / statut</text>
        <text x="12" y="148" fill="#444" font-size="11" font-family="Segoe UI">nb_articles / urgent</text>
        <text x="12" y="163" fill="#888" font-size="10" font-family="Segoe UI">8 statuts possibles</text>
    </g>

    <!-- NEGOCIATIONS -->
    <g id="nego" transform="translate(30, 570)">
        <rect width="178" height="165" rx="8" fill="white" stroke="#9B59B6" stroke-width="2" filter="url(#shadow)"/>
        <rect width="178" height="36" rx="8" fill="#9B59B6"/>
        <rect y="28" width="178" height="8" fill="#9B59B6"/>
        <text x="89" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">🤝 negociations</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 produit_id (FK)</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 client_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 vendeuse_id (FK)</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">prix_propose / statut</text>
        <text x="12" y="148" fill="#444" font-size="11" font-family="Segoe UI">contre_offre_prix</text>
    </g>

    <!-- PAIEMENTS -->
    <g id="paiements" transform="translate(285, 570)">
        <rect width="178" height="165" rx="8" fill="white" stroke="#16A085" stroke-width="2" filter="url(#shadow)"/>
        <rect width="178" height="36" rx="8" fill="#16A085"/>
        <rect y="28" width="178" height="8" fill="#16A085"/>
        <text x="89" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">💳 paiements</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#444" font-size="11" font-family="Segoe UI">reference</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 commande_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 user_id (FK)</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">montant / methode</text>
        <text x="12" y="148" fill="#444" font-size="11" font-family="Segoe UI">statut / cinetpay_id</text>
    </g>

    <!-- AVIS -->
    <g id="avis" transform="translate(535, 570)">
        <rect width="178" height="155" rx="8" fill="white" stroke="#8E44AD" stroke-width="2" filter="url(#shadow)"/>
        <rect width="178" height="36" rx="8" fill="#8E44AD"/>
        <rect y="28" width="178" height="8" fill="#8E44AD"/>
        <text x="89" y="22" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">⭐ avis</text>
        <text x="12" y="58"  fill="#D4580A" font-weight="bold" font-size="11" font-family="Segoe UI">🔑 id (PK)</text>
        <text x="12" y="76"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 produit_id (FK)</text>
        <text x="12" y="94"  fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 client_id (FK)</text>
        <text x="12" y="112" fill="#2A6B35" font-size="11" font-family="Segoe UI">🔗 commande_id (FK)</text>
        <text x="12" y="130" fill="#444" font-size="11" font-family="Segoe UI">note (1-5) / commentaire</text>
    </g>

    <!-- RELATIONS (flèches)-->

    <!-- users → commandes (client) -->
        <line x1="215" y1="140" x2="215" y2="290" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="220" y="220" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">1 passe N</text>

    <!-- users → produits (vendeuse) -->
        <line x1="210" y1="50" x2="530" y2="50" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="360" y="43" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">vend N</text>

    <!-- marches → produits -->
        <line x1="455" y1="80" x2="530" y2="80" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="463" y="73" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">a N</text>

    <!-- marches → commandes -->
        <line x1="370" y1="175" x2="215" y2="290" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="270" y="240" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">regroupe N</text>

    <!-- commandes → commande_items -->
        <line x1="215" y1="385" x2="285" y2="385" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="222" y="378" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">contient N</text>

    <!-- commande_items → produits -->
        <line x1="420" y1="310" x2="575" y2="225" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="460" y="270" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">réf. 1</text>

    <!-- commandes → missions -->
        <line x1="465" y1="385" x2="535" y2="385" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="470" y="378" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">génère 1</text>

    <!-- produits → negociations -->
        <line x1="600" y1="225" x2="190" y2="570" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="340" y="420" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">négocie</text>

    <!-- commandes → paiements -->
        <line x1="215" y1="485" x2="370" y2="570" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="255" y="540" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">paie 1</text>

    <!-- produits → avis -->
        <line x1="715" y1="225" x2="625" y2="570" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
        <text x="690" y="400" fill="#888" font-size="10" font-family="Segoe UI" font-style="italic">noté N</text>

    <!-- Définitions -->
        <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#C8901A"/>
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
        </filter>
        </defs>

        <!-- Légende -->
        <g transform="translate(790, 30)">
            <rect width="280" height="200" rx="10" fill="white" stroke="#E2D0A8" stroke-width="1.5"/>
            <rect width="280" height="38" rx="10" fill="#5C2D0A"/>
            <rect y="28" width="280" height="10" fill="#5C2D0A"/>
            <text x="140" y="24" text-anchor="middle" fill="white" font-weight="bold" font-size="13" font-family="Segoe UI">📖 Légende</text>

            <line x1="20" y1="65" x2="60" y2="65" stroke="#C8901A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
            <text x="70" y="69" fill="#444" font-size="12" font-family="Segoe UI">Relation (FK)</text>

            <rect x="20" y="85" width="40" height="20" rx="3" fill="#D4580A"/>
            <text x="70" y="99" fill="#444" font-size="12" font-family="Segoe UI">En-tête table</text>

            <text x="20" y="130" fill="#D4580A" font-weight="bold" font-size="12" font-family="Segoe UI">🔑 PK</text>
            <text x="70" y="130" fill="#444" font-size="12" font-family="Segoe UI">Clé primaire</text>

            <text x="20" y="155" fill="#2A6B35" font-size="12" font-family="Segoe UI">🔗 FK</text>
            <text x="70" y="155" fill="#444" font-size="12" font-family="Segoe UI">Clé étrangère</text>

            <text x="20" y="185" fill="#888" font-size="11" font-family="Segoe UI">9 tables · Nodejs + MySQL</text>
        </g>

    <!-- Règle importante -->
        <g transform="translate(790, 260)">
        <rect width="280" height="120" rx="10" fill="#FDF0E3" stroke="#D4580A" stroke-width="1.5"/>
        <rect width="280" height="38" rx="10" fill="#D4580A"/>
        <rect y="28" width="280" height="10" fill="#D4580A"/>
        <text x="140" y="24" text-anchor="middle" fill="white" font-weight="bold" font-size="12" font-family="Segoe UI">⚠️ Règle Fondamentale</text>
        <text x="15" y="62"  fill="#5C2D0A" font-size="12" font-family="Segoe UI" font-weight="bold">1 Commande = 1 Marché</text>
        <text x="15" y="82"  fill="#8A6040" font-size="11" font-family="Segoe UI">Tous les produits d'une commande</text>
        <text x="15" y="98"  fill="#8A6040" font-size="11" font-family="Segoe UI">viennent du même marché.</text>
        <text x="15" y="114" fill="#8A6040" font-size="11" font-family="Segoe UI">La Faiseuse ne se déplace qu'à 1 endroit.</text>
        </g>

    </svg>
</div>
</body>
</html>
